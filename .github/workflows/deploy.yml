name: Deploy to Docker Hub

# Kịch bản chạy khi có hành động push vào nhánh main
on:
  push:
    branches: [ "master" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Checkout mã nguồn từ repository về máy ảo của GitHub
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      # Bước 2: Đăng nhập vào Docker Hub sử dụng Secrets
      - name: Login to Docker Hub
        uses: docker/login-action@v4.0.0 
        with:
          username: ${{ secrets.DOCKER_TDT }}
          password: ${{ secrets.DOCKER_PASS }}

      # Bước 3: Thiết lập Docker Buildx (hỗ trợ build nâng cao)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      # Bước 4: Build và Push Image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./trandinhthuan
          push: true
          # Thay 'your-docker-username' bằng tên thật hoặc dùng biến
          # Tags sẽ bao gồm bản 'latest' và mã hash của commit (sha) để dễ quản lý
          tags: |
            ${{ secrets.DOCKER_TDT }}/projectdockerjava:latest
            ${{ secrets.DOCKER_TDT }}/projectdockerjava:${{ github.sha }}
      - name: Triển khai lên DevOps Classroom
        run: |
          REPO="repository/docker"
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest")
          BODY=$(echo "$RESPONSE" | sed "$d")
          CODE=$(echo "$RESPONSE" | tail -n1)
          echo "Webhook HTTP: $CODE"
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Deploy thất bại. Xem chi tiết trong nhóm log bên dưới."
            echo "::group::Chi tiết webhook JSON"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
            exit 1
          fi
          echo "Deploy thành công."
          echo "::group::Chi tiết webhook JSON"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"
